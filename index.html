<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap" rel="stylesheet" />
    <title>Optcause — Curated nonprofit & community organizations</title>
    <script>
      (function() {
        var themeKey = "optcause-theme";
        var sizeKey = "optcause-text-size";
        var themeStored = localStorage.getItem(themeKey);
        var dark = themeStored === "dark" || (themeStored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        var sizeStored = localStorage.getItem(sizeKey);
        var size = (sizeStored === "large" || sizeStored === "x-large") ? sizeStored : "normal";
        document.documentElement.setAttribute("data-text-size", size);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
